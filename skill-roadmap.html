    // Get default for any career
    function getDefaultData(career) {
        return {
            icon: "🎯",
            steps: [`Research ${career} career`, `Get relevant education`, `Gain experience`, `Build network`, `Prepare resume`, `Apply for jobs`, `Continuous learning`],
            questions: [`Why did you choose ${career}?`, `What are your strengths?`, `Tell me about yourself`, `Where do you see yourself in 5 years?`, `Why should we hire you?`]
        };
    }

    // All careers list with categories
    const allCareersByCategory = {
        tech: ["Software Developer", "Web Developer", "App Developer", "AI Engineer", "Machine Learning Engineer", "Data Scientist", "Cyber Security Analyst", "Cloud Engineer", "DevOps Engineer", "Data Analyst", "Blockchain Developer", "Game Developer", "UI/UX Designer", "Full Stack Developer"],
        medical: ["Doctor (MBBS)", "Surgeon", "Dentist", "Pharmacist", "Nurse", "Physiotherapist", "Psychologist", "Radiologist", "Cardiologist", "Veterinary Doctor"],
        engineering: ["Mechanical Engineer", "Civil Engineer", "Electrical Engineer", "Electronics Engineer", "Robotics Engineer", "Aerospace Engineer", "Automobile Engineer", "Biotech Engineer"],
        government: ["IAS", "IPS", "IFS", "SSC CGL Officer", "Bank PO", "RBI Grade B", "Police Officer", "Army Officer", "Navy Officer", "Air Force Officer"],
        commerce: ["Chartered Accountant", "Company Secretary", "Investment Banker", "Financial Analyst", "Business Analyst", "Stock Trader", "Entrepreneur", "HR Manager"],
        arts: ["Graphic Designer", "Fashion Designer", "Interior Designer", "Photographer", "Video Editor", "Content Creator", "YouTuber", "Actor", "Musician", "Writer"],
        other: ["Pilot", "Cabin Crew", "Hotel Manager", "Chef", "Teacher", "Professor", "Lawyer", "Judge", "Space Scientist", "Journalist"]
    };

    let currentCareer = "Software Developer";
    let completedSteps = JSON.parse(localStorage.getItem('skillProgress')) || {};

    function updateProgress() {
        const data = careersData[currentCareer] || getDefaultData(currentCareer);
        let completed = 0;
        for (let i = 0; i < data.steps.length; i++) {
            if (completedSteps[`${currentCareer}_${i}`]) completed++;
        }
        const percent = Math.round((completed / data.steps.length) * 100);
        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('progressPercent').textContent = percent + '%';
    }

    function toggleStep(index) {
        const key = `${currentCareer}_${index}`;
        if (completedSteps[key]) {
            delete completedSteps[key];
        } else {
            completedSteps[key] = true;
        }
        localStorage.setItem('skillProgress', JSON.stringify(completedSteps));
        
        const stepDiv = document.querySelector(`.roadmap-step[data-index='${index}']`);
        if (stepDiv) {
            const check = stepDiv.querySelector('.step-check');
            check.style.opacity = completedSteps[key] ? '1' : '0';
        }
        updateProgress();
    }

    function showInterviewQuestions() {
        const data = careersData[currentCareer] || getDefaultData(currentCareer);
        const modal = document.getElementById('interviewModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        
        modalTitle.innerHTML = `📋 ${currentCareer} - Interview Questions (${data.questions.length} Questions)`;
        modalContent.innerHTML = data.questions.map((q, i) => `
            <div class="interview-item">
                <div class="flex items-start gap-3">
                    <div class="w-6 h-6 rounded-full bg-green-500/20 flex items-center justify-center text-green-400 text-sm font-bold shrink-0 mt-0.5">${i+1}</div>
                    <p class="text-gray-200">${q}</p>
                </div>
            </div>
        `).join('');
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function showRoadmap(careerId) {
        const data = careersData[careerId] || getDefaultData(careerId);
        currentCareer = careerId;
        
        document.getElementById('skillTitle').innerHTML = `<span>${data.icon}</span> ${careerId} Roadmap`;
        
        const container = document.getElementById('roadmapContent');
        container.innerHTML = "";
        data.steps.forEach((step, idx) => {
            const isCompleted = completedSteps[`${currentCareer}_${idx}`];
            const stepDiv = document.createElement('div');
            stepDiv.className = 'roadmap-step p-4 rounded-xl cursor-pointer';
            stepDiv.setAttribute('data-index', idx);
            stepDiv.onclick = () => toggleStep(idx);
            stepDiv.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-6 h-6 rounded-full border-2 border-blue-500 flex items-center justify-center">
                        <div class="w-3 h-3 rounded-full bg-blue-500 transition step-check" style="opacity: ${isCompleted ? '1' : '0'}"></div>
                    </div>
                    <span class="text-gray-200">${step}</span>
                </div>
            `;
            container.appendChild(stepDiv);
        });
        
        document.querySelectorAll('.skill-card').forEach(card => {
            card.classList.remove('active');
            if (card.dataset.skill === careerId) card.classList.add('active');
        });
        
        updateProgress();
    }

    function renderAllCards() {
        for (const [category, careers] of Object.entries(allCareersByCategory)) {
            const grid = document.getElementById(`${category}Grid`);
            if (grid) {
                grid.innerHTML = careers.map(career => {
                    const data = careersData[career] || getDefaultData(career);
                    return `
                        <div class="skill-card p-4 rounded-xl text-center ${currentCareer === career ? 'active' : ''}" data-skill="${career}">
                            <div class="text-3xl mb-2">${data.icon}</div>
                            <div class="font-semibold text-sm">${career.length > 22 ? career.substring(0, 20) + '..' : career}</div>
                        </div>
                    `;
                }).join('');
                
                grid.querySelectorAll('.skill-card').forEach(card => {
                    card.addEventListener('click', () => showRoadmap(card.dataset.skill));
                });
            }
        }
    }

    // Category switching
    document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.category-tab').forEach(t => {
                t.classList.remove('active');
                t.classList.add('bg-white/10');
            });
            tab.classList.add('active');
            tab.classList.remove('bg-white/10');
            
            const category = tab.dataset.cat;
            document.querySelectorAll('.category-grid').forEach(grid => grid.classList.add('hidden'));
            document.getElementById(`${category}Grid`).classList.remove('hidden');
        });
    });

    document.getElementById('showInterviewBtn').addEventListener('click', showInterviewQuestions);
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('interviewModal').classList.add('hidden');
        document.getElementById('interviewModal').classList.remove('flex');
    });
    document.getElementById('interviewModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('interviewModal')) {
            document.getElementById('interviewModal').classList.add('hidden');
            document.getElementById('interviewModal').classList.remove('flex');
        }
    });

    renderAllCards();
    showRoadmap("Software Developer");
</script>
