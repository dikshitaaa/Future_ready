<style>
    * { font-family: 'Inter', sans-serif; }
    body {
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        background-attachment: fixed;
        color: white;
        min-height: 100vh;
    }
    .checklist-card {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        transition: all 0.3s;
        border-radius: 20px;
    }
    .checklist-card:hover {
        transform: translateY(-3px);
        border-color: #10b981;
    }
    .checklist-item {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        transition: all 0.2s;
        cursor: pointer;
        border-radius: 12px;
    }
    .checklist-item:hover {
        background: rgba(59,130,246,0.15);
        transform: translateX(5px);
    }
    .checklist-item.completed {
        background: rgba(16,185,129,0.15);
        border-color: #10b981;
    }
    .checklist-item.completed .check-icon {
        background: #10b981;
        border-color: #10b981;
    }
    .check-icon {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }
    .category-tab {
        transition: all 0.2s;
        cursor: pointer;
        border-radius: 40px;
    }
    .category-tab.active {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }
    .toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        z-index: 1000;
        animation: slideIn 0.3s ease;
        font-weight: bold;
    }
    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    .achievement-popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: linear-gradient(135deg, #1e1e3a, #2d2d5e);
        border: 2px solid #f59e0b;
        border-radius: 20px;
        padding: 30px;
        text-align: center;
        z-index: 1001;
        animation: bounceIn 0.5s ease;
        box-shadow: 0 0 50px rgba(245,158,11,0.5);
    }
    @keyframes bounceIn {
        0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
        50% { transform: translate(-50%, -50%) scale(1.05); }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    .career-select {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 50px;
        padding: 10px 20px;
        color: white;
        outline: none;
        cursor: pointer;
    }

            badges: ["💰 Finance Aspirant", "📊 Modeling Expert", "🎓 MBA Graduate", "📈 CFA Charterholder", "🏆 Investment Banker"]
        },
        "Financial Analyst": {
            icon: "📈", category: "commerce",
            tasks: ["✅ Complete B.Com/BBA", "✅ Learn financial modeling", "✅ Learn Excel advanced", "✅ Learn data analysis", "✅ Complete CFA Level 1", "✅ Get internship", "✅ Build financial reports", "✅ Learn valuation", "✅ Get financial analyst role", "✅ Learn forecasting", "✅ Get CFA Level 2", "✅ Become senior analyst"],
            badges: ["📈 Finance Aspirant", "📊 Excel Expert", "📚 CFA Level 1", "🎯 Financial Analyst", "🏆 Senior Analyst"]
        },

        // ========== ARTS (10 careers) ==========
        "Graphic Designer": {
            icon: "🎨", category: "arts",
            tasks: ["✅ Learn design principles", "✅ Master Photoshop", "✅ Master Illustrator", "✅ Learn Figma", "✅ Learn typography", "✅ Learn color theory", "✅ Build design portfolio", "✅ Learn branding", "✅ Start freelancing", "✅ Get design internship", "✅ Learn motion graphics", "✅ Get graphic designer job"],
            badges: ["🎨 Design Basic", "📐 Photoshop Pro", "🎨 Illustrator Expert", "📱 Figma Master", "🏆 Graphic Designer"]
        },
        "Content Creator": {
            icon: "📱", category: "arts",
            tasks: ["✅ Choose your niche", "✅ Learn content writing", "✅ Learn video editing", "✅ Learn photography basics", "✅ Create social media accounts", "✅ Post consistently", "✅ Grow audience", "✅ Learn SEO", "✅ Collaborate with brands", "✅ Monetize content", "✅ Build personal brand", "✅ Become full-time creator"],
            badges: ["📱 Content Beginner", "✍️ Writing Expert", "🎬 Video Editor", "📈 Social Growth", "🏆 Top Creator"]
        },
        "YouTuber": {
            icon: "📺", category: "arts",
            tasks: ["✅ Choose YouTube niche", "✅ Learn video recording", "✅ Learn video editing", "✅ Create YouTube channel", "✅ Design channel art", "✅ Create thumbnails", "✅ Upload first video", "✅ Learn YouTube SEO", "✅ Post consistently", "✅ Grow subscribers", "✅ Get monetized", "✅ Become full-time YouTuber"],
            badges: ["📺 YouTube Beginner", "🎬 Video Editor", "🎨 Thumbnail Pro", "📈 1K Subs", "🏆 YouTube Star"]
        },

        // ========== OTHER (8 careers) ==========
        "Pilot": {
            icon: "✈️", category: "other",
            tasks: ["✅ Complete 12th PCM", "✅ Clear DGCA medical", "✅ Join flying school", "✅ Complete ground training", "✅ Pass DGCA exams", "✅ Start flying training", "✅ Complete 200 hours flying", "✅ Get CPL license", "✅ Get type rating", "✅ Clear airline interview", "✅ Join as first officer", "✅ Become captain"],
            badges: ["✈️ Pilot Aspirant", "📚 Ground Training", "🛩️ Flying Hours", "🎓 CPL Holder", "👨‍✈️ Captain"]
        },
        "Teacher": {
            icon: "📚", category: "other",
            tasks: ["✅ Complete graduation", "✅ Complete B.Ed", "✅ Clear CTET/TET", "✅ Complete teaching internship", "✅ Apply for schools", "✅ Clear interview", "✅ Join as teacher", "✅ Complete probation", "✅ Learn classroom management", "✅ Get permanent position", "✅ Become senior teacher", "✅ Become vice principal"],
            badges: ["📚 Teacher Aspirant", "🎓 B.Ed Graduate", "📝 CTET Qualified", "👩‍🏫 Teacher", "🏆 Senior Teacher"]
        },
        "Lawyer": {
            icon: "⚖️", category: "other",
            tasks: ["✅ Complete 12th", "✅ Join LLB college", "✅ Complete 1st year", "✅ Complete 2nd year", "✅ Complete 3rd year", "✅ Complete internship", "✅ Clear AIBE exam", "✅ Register as advocate", "✅ Join senior's chamber", "✅ Start independent practice", "✅ Specialize in field", "✅ Become senior lawyer"],
            badges: ["⚖️ Law Aspirant", "🎓 LLB Graduate", "📜 AIBE Qualified", "👨‍⚖️ Advocate", "🏆 Senior Lawyer"]
        }
    };

    // All careers list by category
    const allCareers = {
        tech: ["Software Developer", "Web Developer", "App Developer", "AI Engineer", "Data Scientist", "Cyber Security Analyst", "Cloud Engineer", "DevOps Engineer", "Full Stack Developer", "UI/UX Designer"],
        medical: ["Doctor (MBBS)", "Surgeon", "Dentist", "Pharmacist", "Physiotherapist", "Psychologist"],
        engineering: ["Mechanical Engineer", "Civil Engineer", "Electrical Engineer", "Robotics Engineer", "Aerospace Engineer"],
        government: ["IAS", "IPS", "Bank PO", "SSC CGL Officer"],
        commerce: ["Chartered Accountant", "Investment Banker", "Financial Analyst"],
        arts: ["Graphic Designer", "Content Creator", "YouTuber"],
        other: ["Pilot", "Teacher", "Lawyer"]
    };

    let currentCareer = "Software Developer";
    let completedTasks = JSON.parse(localStorage.getItem('careerBingoTasks')) || {};
    let earnedBadges = JSON.parse(localStorage.getItem('careerBingoBadges')) || {};

    function showToast(message, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? 'linear-gradient(135deg, #ef4444, #dc2626)' : 'linear-gradient(135deg, #10b981, #059669)';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showAchievement(badgeName) {
        const popup = document.createElement('div');
        popup.className = 'achievement-popup';
        popup.innerHTML = `
            <div class="text-6xl mb-3">🏆</div>
            <div class="text-2xl font-bold text-yellow-400 mb-2">ACHIEVEMENT UNLOCKED!</div>
            <div class="text-xl font-bold mb-2">${badgeName}</div>
            <p class="text-gray-300">Great progress! Keep going!</p>
            <button onclick="this.parentElement.remove()" class="mt-4 bg-blue-600 px-6 py-2 rounded-full text-sm">Continue →</button>
        `;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 4000);
    }

    function checkBadges(career, completedCount) {
        const data = careerChecklists[career];
        if (!data) return;
        
        const careerBadges = earnedBadges[career] || [];
        const badgeNames = data.badges;
        
        // Badge requirements: 2,4,6,9,12 tasks
        const requirements = [2, 4, 6, 9, 12];
        
        requirements.forEach((req, idx) => {
            if (completedCount >= req && !careerBadges.includes(badgeNames[idx])) {
                careerBadges.push(badgeNames[idx]);
                earnedBadges[career] = careerBadges;
                localStorage.setItem('careerBingoBadges', JSON.stringify(earnedBadges));
                showAchievement(badgeNames[idx]);
                renderBadges();
            }
        });
    }

    function toggleTask(career, taskIndex) {
        const key = `${career}_${taskIndex}`;
        if (completedTasks[key]) {
            delete completedTasks[key];
            showToast(`❌ Task unchecked`, true);
        } else {
            completedTasks[key] = true;
            showToast(`✅ Task completed! Great job!`);
        }
        localStorage.setItem('careerBingoTasks', JSON.stringify(completedTasks));
        
        const completedCount = getCompletedCount(career);
        checkBadges(career, completedCount);
        renderChecklist();
        updateProgress();
    }

    function getCompletedCount(career) {
        const data = careerChecklists[career];
        if (!data) return 0;
        let count = 0;
        for (let i = 0; i < data.tasks.length; i++) {
            if (completedTasks[`${career}_${i}`]) count++;
        }
        return count;
    }

    function updateProgress() {
        const data = careerChecklists[currentCareer];
        if (!data) return;
        
        const completed = getCompletedCount(currentCareer);
        const total = data.tasks.length;
        const percent = Math.round((completed / total) * 100);
        
        document.getElementById('progressPercent').innerText = percent + '%';
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('completedCount').innerText = completed;
        
        const badges = earnedBadges[currentCareer] || [];
        document.getElementById('badgeCount').innerText = badges.length;
    }

    function renderChecklist() {
        const data = careerChecklists[currentCareer];
        if (!data) return;
        
        document.getElementById('careerTitle').innerHTML = `${data.icon} ${currentCareer} Checklist`;
        
        const container = document.getElementById('checklistContainer');
        container.innerHTML = data.tasks.map((task, index) => {
            const isCompleted = completedTasks[`${currentCareer}_${index}`];
            return `
                <div class="checklist-item p-4 ${isCompleted ? 'completed' : ''}" onclick="toggleTask('${currentCareer}', ${index})">
                    <div class="flex items-center gap-4">
                        <div class="check-icon">${isCompleted ? '✓' : ''}</div>
                        <span class="flex-1 ${isCompleted ? 'line-through text-gray-400' : ''}">${task}</span>
                        ${isCompleted ? '<span class="text-green-400 text-sm">✓ Done</span>' : '<span class="text-gray-500 text-sm">Click to complete</span>'}
                    </div>
                </div>
            `;
        }).join('');
        
        updateProgress();
        renderBadges();
    }

    function renderBadges() {
        const data = careerChecklists[currentCareer];
        if (!data) return;
        
        const earned = earnedBadges[currentCareer] || [];
        const badgeNames = data.badges;
        const requirements = [2, 4, 6, 9, 12];
        
        const container = document.getElementById('badgesContainer');
        container.innerHTML = badgeNames.map((badge, idx) => {
            const isEarned = earned.includes(badge);
            return `
                <div class="bg-white/5 rounded-xl p-3 text-center ${isEarned ? 'border border-yellow-400' : 'opacity-50'}" style="min-width: 100px;">
                    <div class="text-3xl">${isEarned ? '🏆' : '🔒'}</div>
                    <div class="text-xs font-semibold mt-1">${badge}</div>
                    <div class="text-xs text-gray-400">${requirements[idx]} tasks</div>
                    ${isEarned ? '<div class="text-yellow-400 text-xs mt-1">✓ Unlocked</div>' : '<div class="text-gray-500 text-xs mt-1">Locked</div>'}
                </div>
            `;
        }).join('');
    }

    function populateCareerSelect() {
        const select = document.getElementById('careerSelect');
        select.innerHTML = '';
        
        for (const [category, careers] of Object.entries(allCareers)) {
            const optgroup = document.createElement('optgroup');
            optgroup.label = category.toUpperCase();
            careers.forEach(career => {
                const option = document.createElement('option');
                option.value = career;
                option.textContent = `${careerChecklists[career]?.icon || '🎯'} ${career}`;
                optgroup.appendChild(option);
            });
            select.appendChild(optgroup);
        }
        
        select.value = currentCareer;
        select.addEventListener('change', (e) => {
            currentCareer = e.target.value;
            renderChecklist();
        });
    }

    function resetProgress() {
        if (confirm(`Are you sure you want to reset all progress for ${currentCareer}?`)) {
            for (let key in completedTasks) {
                if (key.startsWith(currentCareer + '_')) {
                    delete completedTasks[key];
                }
            }
            localStorage.setItem('careerBingoTasks', JSON.stringify(completedTasks));
            
            if (earnedBadges[currentCareer]) {
                delete earnedBadges[currentCareer];
                localStorage.setItem('careerBingoBadges', JSON.stringify(earnedBadges));
            }
            
            renderChecklist();
            showToast(`Progress reset for ${currentCareer}`);
        }
    }

    // Category tabs
    document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.category-tab').forEach(t => {
                t.classList.remove('active');
                t.classList.add('bg-white/10');
            });
            tab.classList.add('active');
            tab.classList.remove('bg-white/10');
            
            const category = tab.dataset.cat;
            const careers = allCareers[category];
            const select = document.getElementById('careerSelect');
            
            if (careers && careers.length > 0) {
                currentCareer = careers[0];
                select.value = currentCareer;
                renderChecklist();
            }
        });
    });

    document.getElementById('resetBtn').addEventListener('click', resetProgress);
    
    populateCareerSelect();
    renderChecklist();

    window.toggleTask = toggleTask;
</script>
</body>
</html>
